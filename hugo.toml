baseURL = "https://geoffrey-coulaud.fr/"
title = "Geoffrey Coulaud"
enableGitInfo = true
disableKinds = ["taxonomy", "term"]
enableRobotsTXT = true

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

[languages.fr]
  locale = "fr-FR"
  direction = "ltr"
  label = "Français"
  contentDir = "content"
  weight = 1

[languages.en]
  locale = "en-US"
  direction = "ltr"
  label = "English"
  contentDir = "content"
  weight = 2

[params]
  description = "Développeur full stack. Blog, projets, collaborations."
  keywords = ["geoffrey coulaud", "full stack", "développeur", "developer", "blog"]
  tagline = ""
  footer = " "
  colorScheme = "blue"
  mainSections = ["posts"]
  dateFormat = "2006-01-02"
  dateFormatToc = "2006.01.02"
  readmore = false
  feedSize = 25
  showAuthor = false

  [params.assets]
    favicon = "favicon.ico"
    logo = "logo.png"
    disable_fingerprinting = false

  [params.seo]
    publisher = "Geoffrey Coulaud"

  [params.comments]
    enable = false

[menus]
  [[menus.main]]
    identifier = "home"
    name = "Home"
    pageRef = "/"
    weight = 1
  [[menus.main]]
    identifier = "posts"
    name = "Blog"
    pageRef = "/posts"
    weight = 2

  [[menus.feeds]]
    identifier = "rss"
    name = "RSS"
    url = "/posts/index.xml"
    weight = 1

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"

[outputs]
  home = ["html", "rss", "atom", "jsonfeed"]
  section = ["html", "rss", "atom", "jsonfeed"]
  page = ["html"]

[outputFormats]
  [outputFormats.atom]
    name = "atom"
    mediaType = "text/xml"
    baseName = "atom"
    rel = "alternate"
    isPlainText = false
    isHTML = false
    noUgly = true
  [outputFormats.jsonfeed]
    name = "jsonfeed"
    mediaType = "application/feed+json"
    baseName = "feed"
    rel = "alternate"
    isPlainText = true
    isHTML = false

[mediaTypes]
  [mediaTypes."text/xml"]
    suffixes = ["xml"]
  [mediaTypes."application/feed+json"]
    suffixes = ["json"]

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

[frontmatter]
  lastmod = ["lastmod", ":git", "modified", "date", "publishdate", "pubdate", "published"]

[module]
  [module.hugoVersion]
    extended = true
    min = "0.121.0"
  [[module.imports]]
    path = "github.com/sergeyklay/gohugo-theme-ed"

[minify]
  disableXML = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepQuotes = true
