baseURL = "https://geoffrey-coulaud.fr/"
title = "Geoffrey Coulaud"
enableGitInfo = true
enableRobotsTXT = true

# Front matter dates are bare (YYYY-MM-DD), so they need a timezone to resolve to
# an instant. Without this they'd be read as midnight UTC, ie. ahead of local time.
timeZone = "Europe/Paris"

# Deploys only happen on push to main, so a future-dated page would never appear
# on its own. Excluding it would hide content without ever publishing it later.
# Use the `draft` field to hold something back.
buildFuture = true

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

[params]
  mainSections = ["posts"]
  rssFullContent = true
  favicon = "dancing-bug.png"

  [params.sidebar]
    avatar = "dancing-bug.gif"
    compact = false

  [params.footer]
    since = 2026

  [params.article]
    headingAnchor = true
    math = false
    toc = true
    readingTime = true

    [params.article.license]
      enabled = false

  [params.comments]
    enabled = false

  [params.opengraph.twitter]
    site = "@geoffreycoulaud"
    card = "summary_large_image"

  [params.widgets]
    homepage = [
      {type = "search"},
      {type = "archives", params = {limit = 5}}
    ]
    shares = [
      {type = "search"}
    ]

  [params.colorScheme]
    toggle = true
    default = "auto"

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

[languages.fr]
  label = "Français"
  locale = "fr-FR"
  direction = "ltr"
  contentDir = "content"
  weight = 1

  [languages.fr.params.sidebar]
    subtitle = "Développeur full stack"

  [[languages.fr.menus.main]]
    identifier = "about"
    name = "À propos"
    url = "/about/"
    weight = 1
    [languages.fr.menus.main.params]
      icon = "user"
  [[languages.fr.menus.main]]
    identifier = "posts"
    name = "Blog"
    pageRef = "/posts"
    weight = 2
    [languages.fr.menus.main.params]
      icon = "messages"
  [[languages.fr.menus.main]]
    identifier = "rss"
    name = "RSS"
    url = "/posts/index.xml"
    weight = 3
    [languages.fr.menus.main.params]
      icon = "rss"
  [[languages.fr.menus.main]]
    identifier = "shares"
    name = "Partages <sup>(en)</sup>"
    url = "/en/shares/"
    weight = 4
    [languages.fr.menus.main.params]
      icon = "link"
  [[languages.fr.menus.main]]
    identifier = "shares-rss"
    name = "RSS Partages <sup>(en)</sup>"
    url = "/en/shares/index.xml"
    weight = 5
    [languages.fr.menus.main.params]
      icon = "rss"
  [[languages.fr.menus.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/GeoffreyCoulaud"
    weight = 6
    [languages.fr.menus.main.params]
      icon = "brand-github"
      external = true
      newTab = true
  [[languages.fr.menus.main]]
    identifier = "linkedin"
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/geoffrey-coulaud-2b6b32276/"
    weight = 7
    [languages.fr.menus.main.params]
      icon = "brand-linkedin"
      external = true
      newTab = true

[languages.en]
  label = "English"
  locale = "en-US"
  direction = "ltr"
  contentDir = "content"
  weight = 2

  [languages.en.params.sidebar]
    subtitle = "Full stack developer"

  [[languages.en.menus.main]]
    identifier = "about"
    name = "About"
    url = "/en/about/"
    weight = 1
    [languages.en.menus.main.params]
      icon = "user"
  [[languages.en.menus.main]]
    identifier = "posts"
    name = "Blog"
    pageRef = "/posts"
    weight = 2
    [languages.en.menus.main.params]
      icon = "messages"
  [[languages.en.menus.main]]
    identifier = "rss"
    name = "RSS"
    url = "/posts/index.xml"
    weight = 3
    [languages.en.menus.main.params]
      icon = "rss"
  [[languages.en.menus.main]]
    identifier = "shares"
    name = "Shares"
    pageRef = "/shares"
    weight = 4
    [languages.en.menus.main.params]
      icon = "link"
  [[languages.en.menus.main]]
    identifier = "shares-rss"
    name = "Shares RSS"
    url = "/en/shares/index.xml"
    weight = 5
    [languages.en.menus.main.params]
      icon = "rss"
  [[languages.en.menus.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/GeoffreyCoulaud"
    weight = 6
    [languages.en.menus.main.params]
      icon = "brand-github"
      external = true
      newTab = true
  [[languages.en.menus.main]]
    identifier = "linkedin"
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/geoffrey-coulaud-2b6b32276/"
    weight = 7
    [languages.en.menus.main.params]
      icon = "brand-linkedin"
      external = true
      newTab = true

[permalinks]
  posts = "/posts/:slug/"
  shares = "/shares/:contentbasename/"
  page = "/:slug/"

[pagination]
  pagerSize = 10

[outputs]
  home = ["html", "rss"]
  section = ["html", "rss"]
  page = ["html"]

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

[mediaTypes]
  [mediaTypes."application/javascript"]
    suffixes = ["js"]

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

[frontmatter]
  lastmod = ["lastmod", ":git", "modified", "date", "publishdate", "pubdate", "published"]

[module]
  [module.hugoVersion]
    extended = true
    min = "0.157.0"
  [[module.imports]]
    path = "github.com/CaiJimmy/hugo-theme-stack/v4"

[minify]
  disableXML = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepQuotes = true
